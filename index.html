<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shadow Dungeon Multi-Lang</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #d1d1d1;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; user-select: none; touch-action: manipulation;
        }
        #game-container { text-align: center; border: 2px solid #444; padding: 10px; background-color: #000; width: 95%; max-width: 450px; }
        #screen { font-size: 14px; line-height: 1.1; letter-spacing: 1px; white-space: pre; margin-bottom: 10px; color: #3f3; overflow-x: hidden; }
        #log { height: 80px; overflow-y: hidden; font-size: 12px; color: #888; text-align: left; border-top: 1px solid #222; padding-top: 5px; }
        #controls { display: grid; grid-template-areas: ". up ." "left wait right" ". down ."; gap: 10px; margin-top: 15px; justify-content: center; }
        .btn { width: 60px; height: 60px; background-color: #222; border: 1px solid #555; color: white; font-size: 20px; display: flex; justify-content: center; align-items: center; border-radius: 8px; cursor: pointer; }
        .btn:active { background-color: #444; }
        #up { grid-area: up; } #down { grid-area: down; } #left { grid-area: left; } #right { grid-area: right; } #wait { grid-area: wait; background-color: #333; font-size: 14px; }
        .log-entry { margin-bottom: 2px; padding-left: 5px; border-left: 2px solid #333; }
        .log-player { color: #fff; border-left-color: #fff; }
        .log-enemy { color: #ff5555; border-left-color: #ff5555; }
        .log-system { color: #55aaff; border-left-color: #55aaff; }
        .log-boss { color: #ff55ff; font-weight: bold; border-left-color: #ff55ff; }
        .log-lvup { color: #ffff55; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="screen"></div>
    <div id="log"></div>
    <div id="controls">
        <div class="btn" id="up" onclick="playerMove(0, -1)">↑</div>
        <div class="btn" id="left" onclick="playerMove(-1, 0)">←</div>
        <div class="btn" id="wait" onclick="playerMove(0, 0)">WAIT</div>
        <div class="btn" id="right" onclick="playerMove(1, 0)">→</div>
        <div class="btn" id="down" onclick="playerMove(0, 1)">↓</div>
    </div>
</div>

<script>
    // --- 言語設定辞書 ---
    const i18n = {
        ja: {
            start: "影の迷宮へ足を踏み入れた...",
            bossNear: "最深部の空気が震えている...",
            wall: "道が塞がれている。",
            potion: "ポーションを回収。傷が癒えた。",
            stairs: "深層へ降りる... ({depth}F)",
            lvup: "レベルアップ！ 強さが身に染みる (Lv{lv})",
            attack: "{name}に {dmg} のダメージ！",
            defeat: "{name}を倒した。",
            damaged: "{name}の攻撃！ {dmg} のダメージ！",
            win: "守護者を倒し、迷宮の主となった！",
            lose: "力尽き、影に呑まれた...",
            floor: "階",
            monsters: ["影のネズミ", "彷徨う鎧", "深淵の眼"],
            boss: "古の守護者"
        },
        es: {
            start: "Has entrado en la Mazmorra de las Sombras...",
            bossNear: "El aire vibra en lo más profundo...",
            wall: "El camino está bloqueado.",
            potion: "Poción usada. Tus heridas sanan.",
            stairs: "Bajando al nivel inferior... ({depth}F)",
            lvup: "¡Subiste de nivel! Sientes más poder (Nv{lv})",
            attack: "¡Atacas a {name} causando {dmg}!",
            defeat: "Has derrotado a {name}.",
            damaged: "¡{name} ataca! Sufres {dmg} de daño.",
            win: "¡Victoria! Has conquistado la mazmorra.",
            lose: "Has caído... las sombras te consumen.",
            floor: "F",
            monsters: ["Rata Sombría", "Armadura Errante", "Ojo del Abismo"],
            boss: "El Guardián Antiguo"
        }
    };

    // ブラウザの言語を取得 (スペイン語以外は日本語をデフォルトに)
    const lang = navigator.language.startsWith('es') ? 'es' : 'ja';
    const T = i18n[lang];

    // --- 設定 ---
    const WIDTH = 30; const HEIGHT = 15; const MAX_DEPTH = 5; const VISION_RADIUS = 4;
    const TILE_WALL = '#'; const TILE_FLOOR = '·'; const TILE_PLAYER = '@';
    const TILE_MONSTER = 'E'; const TILE_BOSS = 'Ω'; const TILE_STAIRS = '>';
    const TILE_POTION = 'P'; const TILE_UNKNOWN = ' ';

    let gameState = {
        depth: 1,
        player: { x: 0, y: 0, hp: 25, maxHp: 25, atk: 5, exp: 0, lv: 1, nextExp: 15 },
        map: [], explored: [], monsters: [], log: [], gameOver: false
    };

    const monsterPool = [
        { name: T.monsters[0], tile: 'r', hp: 5, atk: 2, exp: 4, color: '#999' },
        { name: T.monsters[1], tile: 'A', hp: 12, atk: 5, exp: 10, color: '#aaa' },
        { name: T.monsters[2], tile: 'e', hp: 20, atk: 8, exp: 20, color: '#f55' }
    ];
    const bossData = { name: T.boss, tile: 'Ω', hp: 60, atk: 12, exp: 0, color: '#f0f' };

    function init() {
        addLog(T.start, 'log-system');
        gameState.depth = 1;
        gameState.player = { x: 0, y: 0, hp: 25, maxHp: 25, atk: 5, exp: 0, lv: 1, nextExp: 15 };
        gameState.gameOver = false;
        setupLevel();
    }

    function setupLevel() {
        gameState.map = generateMap();
        gameState.explored = Array.from({ length: HEIGHT }, () => Array(WIDTH).fill(false));
        gameState.monsters = [];
        placeOnFloor((x, y) => { gameState.player.x = x; gameState.player.y = y; });
        if (gameState.depth < MAX_DEPTH) {
            placeOnFloor((x, y) => gameState.map[y][x] = TILE_STAIRS);
        } else {
            placeOnFloor((x, y) => {
                const boss = { ...bossData, x, y };
                gameState.map[y][x] = TILE_BOSS;
                gameState.monsters.push(boss);
                addLog(T.bossNear, 'log-boss');
            });
        }
        const numMonsters = 3 + gameState.depth;
        for (let i = 0; i < numMonsters; i++) {
            if (gameState.depth === MAX_DEPTH && i === 0) continue;
            placeOnFloor((x, y) => {
                const type = monsterPool[Math.min(gameState.depth - 1, monsterPool.length - 1)];
                gameState.monsters.push({ ...type, x, y });
                gameState.map[y][x] = TILE_MONSTER;
            });
        }
        placeOnFloor((x, y) => gameState.map[y][x] = TILE_POTION);
        updateVision(); draw();
    }

    function placeOnFloor(cb) {
        let x, y; do { x = Math.floor(Math.random() * WIDTH); y = Math.floor(Math.random() * HEIGHT); } while (gameState.map[y][x] !== TILE_FLOOR);
        cb(x, y);
    }

    function generateMap() {
        let map = [];
        for (let y = 0; y < HEIGHT; y++) {
            map[y] = [];
            for (let x = 0; x < WIDTH; x++) {
                map[y][x] = (x === 0 || x === WIDTH - 1 || y === 0 || y === HEIGHT - 1 || Math.random() < 0.15) ? TILE_WALL : TILE_FLOOR;
            }
        }
        return map;
    }

    function updateVision() {
        for (let y = 0; y < HEIGHT; y++) {
            for (let x = 0; x < WIDTH; x++) {
                if (Math.sqrt((x - gameState.player.x)**2 + (y - gameState.player.y)**2) <= VISION_RADIUS) gameState.explored[y][x] = true;
            }
        }
    }

    function draw() {
        const screen = document.getElementById('screen');
        let view = ""; const p = gameState.player;
        let hud = `Lv:${p.lv} HP:${p.hp}/${p.maxHp} ATK:${p.atk} ${gameState.depth}${T.floor}\n`;
        for (let y = 0; y < HEIGHT; y++) {
            for (let x = 0; x < WIDTH; x++) {
                const isVisible = Math.sqrt((x - p.x)**2 + (y - p.y)**2) <= VISION_RADIUS;
                if (x === p.x && y === p.y) view += `<span style="color:#fff;">${TILE_PLAYER}</span>`;
                else if (isVisible) {
                    let tile = gameState.map[y][x];
                    if (tile === TILE_MONSTER || tile === TILE_BOSS) {
                        const m = gameState.monsters.find(m => m.x === x && m.y === y);
                        view += `<span style="color:${m.color};">${m.tile}</span>`;
                    } else if (tile === TILE_WALL) view += `<span style="color:#444;">${TILE_WALL}</span>`;
                    else if (tile === TILE_POTION) view += `<span style="color:#5f5;">${TILE_POTION}</span>`;
                    else if (tile === TILE_STAIRS) view += `<span style="color:#ff5;">${TILE_STAIRS}</span>`;
                    else view += `<span style="color:#222;">${TILE_FLOOR}</span>`;
                } else if (gameState.explored[y][x]) {
                    view += `<span style="color:#111;">${gameState.map[y][x] === TILE_WALL ? TILE_WALL : TILE_FLOOR}</span>`;
                } else view += TILE_UNKNOWN;
            }
            view += "\n";
        }
        screen.innerHTML = hud + "\n" + view;
        drawLog();
    }

    function drawLog() {
        const logDiv = document.getElementById('log'); logDiv.innerHTML = "";
        gameState.log.slice(-4).forEach(e => {
            const d = document.createElement('div'); d.className = `log-entry ${e.type}`; d.textContent = e.text;
            logDiv.appendChild(d);
        });
    }

    function addLog(text, type = 'log-system') { gameState.log.push({ text, type }); drawLog(); }

    function playerMove(dx, dy) {
        if (gameState.gameOver) return;
        const nx = gameState.player.x + dx; const ny = gameState.player.y + dy;
        if (nx < 0 || nx >= WIDTH || ny < 0 || ny >= HEIGHT) return;
        const tile = gameState.map[ny][nx];
        if (tile === TILE_WALL) {
            addLog(T.wall, 'log-system');
        } else if (tile === TILE_MONSTER || tile === TILE_BOSS) {
            const m = gameState.monsters.find(m => m.x === nx && m.y === ny);
            if (m) {
                const dmg = gameState.player.atk + Math.floor(Math.random() * 3);
                m.hp -= dmg;
                addLog(T.attack.replace('{name}', m.name).replace('{dmg}', dmg), 'log-player');
                if (m.hp <= 0) {
                    addLog(T.defeat.replace('{name}', m.name), 'log-system');
                    gainExp(m.exp); gameState.map[m.y][m.x] = TILE_FLOOR;
                    gameState.monsters = gameState.monsters.filter(mon => mon !== m);
                    if (m.tile === TILE_BOSS) { endGame(true); return; }
                }
            }
            monstersTurn();
        } else {
            gameState.player.x = nx; gameState.player.y = ny;
            if (tile === TILE_POTION) {
                gameState.player.hp = Math.min(gameState.player.maxHp, gameState.player.hp + 10);
                addLog(T.potion, 'log-player'); gameState.map[ny][nx] = TILE_FLOOR;
            } else if (tile === TILE_STAIRS) {
                gameState.depth++; addLog(T.stairs.replace('{depth}', gameState.depth), 'log-system');
                setupLevel(); return;
            }
            if(gameState.player.hp < gameState.player.maxHp && Math.random() < 0.2) gameState.player.hp++;
            monstersTurn();
        }
        updateVision(); draw();
    }

    function gainExp(amt) {
        gameState.player.exp += amt;
        if (gameState.player.exp >= gameState.player.nextExp) {
            const p = gameState.player; p.lv++; p.maxHp += 8; p.hp = p.maxHp; p.atk += 3;
            p.exp -= p.nextExp; p.nextExp = Math.floor(p.nextExp * 1.6);
            addLog(T.lvup.replace('{lv}', p.lv), 'log-lvup');
        }
    }

    function monstersTurn() {
        gameState.monsters.forEach(m => {
            const dx = gameState.player.x - m.x; const dy = gameState.player.y - m.y;
            const dist = Math.abs(dx) + Math.abs(dy);
            if (dist === 1) {
                const dmg = Math.max(1, m.atk - Math.floor(Math.random() * 2));
                gameState.player.hp -= dmg;
                addLog(T.damaged.replace('{name}', m.name).replace('{dmg}', dmg), 'log-enemy');
                if (gameState.player.hp <= 0) endGame(false);
            } else if (dist <= 5) {
                let mx = m.x + (dx > 0 ? 1 : dx < 0 ? -1 : 0);
                let my = m.y + (dy > 0 ? 1 : dy < 0 ? -1 : 0);
                if (gameState.map[my][mx] === TILE_FLOOR) {
                    gameState.map[m.y][m.x] = TILE_FLOOR; m.x = mx; m.y = my;
                    gameState.map[my][mx] = (m.tile === TILE_BOSS ? TILE_BOSS : TILE_MONSTER);
                }
            }
        });
    }

    function endGame(win) {
        gameState.gameOver = true; draw();
        setTimeout(() => { alert(win ? T.win : T.lose); init(); }, 100);
    }

    document.addEventListener('keydown', e => {
        if (gameState.gameOver) return;
        let dx = 0, dy = 0;
        if (e.key === 'ArrowUp') dy = -1; else if (e.key === 'ArrowDown') dy = 1;
        else if (e.key === 'ArrowLeft') dx = -1; else if (e.key === 'ArrowRight') dx = 1;
        else if (e.key === ' ') { dx = 0; dy = 0; } else return;
        e.preventDefault(); playerMove(dx, dy);
    });

    init();
</script>
</body>
</html>
